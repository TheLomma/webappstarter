<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="Web App Launcher – Dein persönlicher App-Startbildschirm" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="App Launcher" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="App Launcher" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="%PUBLIC_URL%/apple-touch-icon-120x120.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:title" content="Web App Launcher" />
    <meta property="og:description" content="Dein persönlicher App-Startbildschirm" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/icon-512x512.png" />

    <!-- Splash Screens iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>Web App Launcher</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      html, body {
        height: 100%;
        width: 100%;
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        background: linear-gradient(135deg, #0f0f17 0%, #1a1a2e 50%, #16213e 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      }

      #root {
        height: 100%;
        width: 100%;
      }

      /* Splash / Loading Screen */
      #splash {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0f0f17 0%, #1a1a2e 50%, #16213e 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease;
      }

      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #splash .splash-icon {
        font-size: 72px;
        margin-bottom: 20px;
        animation: splashPulse 1.5s ease-in-out infinite;
      }

      #splash .splash-title {
        font-size: 22px;
        font-weight: 800;
        color: #e2e8f0;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }

      #splash .splash-sub {
        font-size: 13px;
        color: rgba(226,232,240,0.5);
      }

      #splash .splash-loader {
        margin-top: 40px;
        width: 40px;
        height: 4px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
        overflow: hidden;
      }

      #splash .splash-loader-bar {
        height: 100%;
        background: linear-gradient(90deg, #a78bfa, #38bdf8);
        border-radius: 2px;
        animation: splashLoad 1.2s ease-in-out infinite;
      }

      @keyframes splashPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }

      @keyframes splashLoad {
        0% { width: 0%; margin-left: 0%; }
        50% { width: 70%; margin-left: 15%; }
        100% { width: 0%; margin-left: 100%; }
      }

      /* Safe Area Support */
      @supports (padding: env(safe-area-inset-bottom)) {
        body {
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
        }
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 4px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.15);
        border-radius: 2px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.25);
      }

      /* Selection */
      ::selection {
        background: rgba(167,139,250,0.3);
        color: #e2e8f0;
      }
    </style>
  </head>
  <body>
    <noscript>JavaScript ist erforderlich um diese App zu nutzen.</noscript>

    <!-- Splash Screen -->
    <div id="splash">
      <div class="splash-icon">🚀</div>
      <div class="splash-title">Web App Launcher</div>
      <div class="splash-sub">v3.5</div>
      <div class="splash-loader">
        <div class="splash-loader-bar"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash screen when React app is ready
      window.addEventListener('load', function () {
        setTimeout(function () {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(function () {
              splash.remove();
            }, 500);
          }
        }, 800);
      });

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('%PUBLIC_URL%/service-worker.js')
            .then(function (reg) {
              console.log('SW registered:', reg.scope);
            })
            .catch(function (err) {
              console.log('SW registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
